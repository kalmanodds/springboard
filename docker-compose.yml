services:
  springboard:
    build: .
    ports:
      - "4321:4321"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 4321

  # --- Example apps with dash labels ---
  # These use real images so clicking tiles opens an actual web UI.

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    ports:
      - "8096:8096"
    labels:
      dash.enable: "true"
      dash.name: "Jellyfin"
      dash.category: "Media"
      dash.icon: "simple-icons:jellyfin"
      dash.url: "http://localhost:8096"
      dash.description: "Media server"

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    ports:
      - "8989:8989"
    labels:
      dash.enable: "true"
      dash.name: "Sonarr"
      dash.category: "Media"
      dash.icon: "mdi:television-play"
      dash.url: "http://localhost:8989"
      dash.description: "TV series manager"

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    ports:
      - "7878:7878"
    labels:
      dash.enable: "true"
      dash.name: "Radarr"
      dash.category: "Media"
      dash.icon: "mdi:movie-open"
      dash.url: "http://localhost:7878"
      dash.description: "Movie manager"

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    environment:
      - WEBUI_PORT=8080
    ports:
      - "8080:8080"
    labels:
      dash.enable: "true"
      dash.name: "qBittorrent"
      dash.category: "Downloads"
      dash.icon: "simple-icons:qbittorrent"
      dash.url: "http://localhost:8080"
      dash.description: "Torrent client"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    labels:
      dash.enable: "true"
      dash.name: "Prometheus"
      dash.category: "System"
      dash.icon: "simple-icons:prometheus"
      dash.url: "http://localhost:9090"
      dash.description: "Metrics collection"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    labels:
      dash.enable: "true"
      dash.name: "Grafana"
      dash.category: "System"
      dash.icon: "simple-icons:grafana"
      dash.url: "http://localhost:3000"
      dash.description: "Metrics dashboard"

  # This one intentionally has no dash.enable label — should not appear
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
