services:
  springboard:
    build: .
    ports:
      - "4321:4321"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 4321

  # --- Example apps with dash labels ---
  # These stand in for real services during development.
  # traefik/whoami is ~3MB and starts instantly.

  plex:
    image: traefik/whoami
    command: --port 32400
    ports:
      - "32400:32400"
    labels:
      dash.enable: "true"
      dash.name: "Plex"
      dash.category: "Media"
      dash.icon: "simple-icons:plex"
      dash.url: "http://localhost:32400"
      dash.description: "Media server"

  sonarr:
    image: traefik/whoami
    command: --port 8989
    ports:
      - "8989:8989"
    labels:
      dash.enable: "true"
      dash.name: "Sonarr"
      dash.category: "Media"
      dash.icon: "mdi:television-play"
      dash.url: "http://localhost:8989"
      dash.description: "TV series manager"

  radarr:
    image: traefik/whoami
    command: --port 7878
    ports:
      - "7878:7878"
    labels:
      dash.enable: "true"
      dash.name: "Radarr"
      dash.category: "Media"
      dash.icon: "mdi:movie-open"
      dash.url: "http://localhost:7878"
      dash.description: "Movie manager"

  portainer:
    image: traefik/whoami
    command: --port 9000
    ports:
      - "9000:9000"
    labels:
      dash.enable: "true"
      dash.name: "Portainer"
      dash.category: "System"
      dash.icon: "simple-icons:portainer"
      dash.url: "http://localhost:9000"
      dash.description: "Container management"

  prometheus:
    image: traefik/whoami
    command: --port 9090
    ports:
      - "9090:9090"
    labels:
      dash.enable: "true"
      dash.name: "Prometheus"
      dash.category: "System"
      dash.icon: "simple-icons:prometheus"
      dash.url: "http://localhost:9090"
      dash.description: "Metrics collection"

  pihole:
    image: traefik/whoami
    command: --port 8080
    ports:
      - "8080:8080"
    labels:
      dash.enable: "true"
      dash.name: "Pi-hole"
      dash.category: "Network"
      dash.icon: "simple-icons:pihole"
      dash.url: "http://localhost:8080"
      dash.description: "DNS ad blocker"

  # This one intentionally has no dash.enable label — should not appear
  ghost:
    image: traefik/whoami
